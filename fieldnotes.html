<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Field Notes CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f7f4;--surface:#ffffff;--surface2:#f2f1ee;
  --border:#e0ddd8;--border2:#c8c5be;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --accent:#1a3a5c;--accent2:#2558a0;--accent-bg:#eef3f9;
  --green:#1a6640;--green-bg:#edf7f1;
  --amber:#7a4f00;--amber-bg:#fef8ec;
  --red:#8b1a1a;--red-bg:#fdf0f0;
  --radius:10px;--radius-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:680px;margin:0 auto;background:var(--surface);box-shadow:0 0 0 0.5px var(--border)}

/* TOP BAR */
.topbar{background:var(--accent);color:#fff;padding:12px 16px 10px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.topbar-logo{font-size:18px;font-weight:700;letter-spacing:-.5px;flex:1}
.topbar-logo span{font-weight:300;opacity:.7}
.icon-btn{background:none;border:none;color:#fff;cursor:pointer;padding:4px;border-radius:var(--radius-sm);opacity:.8;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{opacity:1;background:rgba(255,255,255,.1)}
.icon-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* NAV */
.nav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--accent);border-top:1px solid rgba(255,255,255,.1);position:sticky;top:52px;z-index:50}
.nav-btn{background:none;border:none;color:rgba(255,255,255,.6);padding:8px 4px 10px;font-size:11px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.02em;border-bottom:2px solid transparent;transition:all .15s}
.nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:#fff;border-bottom-color:#fff}

/* CONTENT */
.page{display:none;padding:0 0 80px}
.page.active{display:block}

/* SEARCH BAR */
.search-wrap{padding:12px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:104px;z-index:40}
.search-row{display:flex;gap:8px;align-items:center}
.search-filter{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);appearance:none;-webkit-appearance:none;min-width:90px}
.search-box{flex:1;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;background:var(--surface);color:var(--text)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 4px}

/* SECTION HEADERS */
.section-hd{padding:16px 16px 8px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}

/* CARDS */
.card{background:var(--surface);border-bottom:0.5px solid var(--border);padding:12px 16px;cursor:pointer;transition:background .1s;display:flex;align-items:flex-start;gap:12px}
.card:active{background:var(--surface2)}
.card-body{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:12px;color:var(--text3);margin-top:3px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chevron{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-top:3px}

/* AVATAR */
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;letter-spacing:-.5px}
.av-blue{background:var(--accent-bg);color:var(--accent2)}
.av-green{background:var(--green-bg);color:var(--green)}
.av-amber{background:var(--amber-bg);color:var(--amber)}
.av-gray{background:var(--surface2);color:var(--text2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
.b-sponsor{background:var(--accent-bg);color:var(--accent2)}
.b-corp{background:var(--green-bg);color:var(--green)}
.b-other{background:var(--surface2);color:var(--text2)}
.b-now{background:#fff3cd;color:#856404}
.b-later{background:#e8f4fd;color:#1a5276}
.b-radar{background:var(--surface2);color:var(--text2)}
.b-active{background:var(--green-bg);color:var(--green)}
.b-pipeline{background:var(--amber-bg);color:var(--amber)}
.b-watching{background:var(--surface2);color:var(--text2)}

/* PRIORITY DOTS */
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dot-high{background:#e74c3c}
.dot-med{background:#f39c12}
.dot-low{background:#bdc3c7}

/* INTERACTION LOG */
.log-item{padding:12px 16px;border-bottom:0.5px solid var(--border)}
.log-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.log-date{font-size:12px;color:var(--text3);font-weight:500}
.log-type{font-size:11px;padding:1px 6px;border-radius:10px;background:var(--surface2);color:var(--text2)}
.log-body{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:6px}
.log-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:2px 7px;border-radius:10px}
.tag-contact{background:var(--accent-bg);color:var(--accent2)}
.tag-company{background:var(--green-bg);color:var(--green)}

/* TODO */
.todo-item{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.todo-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.todo-check.done{background:var(--green);border-color:var(--green)}
.todo-check.done svg{display:block}
.todo-check svg{display:none;width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.todo-content{flex:1;min-width:0}
.todo-text{font-size:15px;color:var(--text);line-height:1.4}
.todo-text.done{text-decoration:line-through;color:var(--text3)}
.todo-link{font-size:12px;color:var(--text3);margin-top:3px}
.todo-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.todo-actions{display:flex;gap:4px}
.mini-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 7px;font-size:11px;color:var(--text2);cursor:pointer}
.mini-btn:active{background:var(--surface2)}
.move-sel{font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text2);appearance:none;-webkit-appearance:none}

/* PROFILE */
.profile-hero{padding:20px 16px 16px;border-bottom:0.5px solid var(--border);display:flex;gap:14px;align-items:flex-start}
.profile-avatar{width:56px;height:56px;border-radius:50%;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.profile-sub{font-size:14px;color:var(--text2);margin-bottom:6px}
.profile-badges{display:flex;flex-wrap:wrap;gap:5px}
.profile-actions{display:flex;gap:8px;padding:10px 16px;border-bottom:0.5px solid var(--border);background:var(--surface2)}
.action-btn{flex:1;padding:8px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);font-size:13px;font-weight:500;color:var(--accent2);cursor:pointer;text-align:center}
.action-btn:active{background:var(--surface2)}
.profile-section{border-bottom:0.5px solid var(--border)}
.profile-section-hd{padding:12px 16px 0;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.profile-field{display:flex;padding:8px 16px;gap:12px;border-bottom:0.5px solid var(--border)}
.profile-field:last-child{border-bottom:none}
.pf-label{font-size:13px;color:var(--text3);width:90px;flex-shrink:0;padding-top:1px}
.pf-value{font-size:14px;color:var(--text);flex:1;line-height:1.5}
.pf-value a{color:var(--accent2);text-decoration:none}
.bio-box{padding:10px 16px 14px}
.bio-text{font-size:14px;color:var(--text2);line-height:1.6;background:var(--surface2);padding:10px 12px;border-radius:var(--radius-sm)}
.subsection-hd{padding:14px 16px 6px;font-size:12px;font-weight:600;color:var(--text2)}
.subsection-hd.mention{color:var(--text3);font-style:italic}
.empty-section{padding:10px 16px 14px;font-size:13px;color:var(--text3);font-style:italic}
.contact-row{padding:10px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer}
.contact-row:last-child{border-bottom:none}
.contact-row:active{background:var(--surface2)}
.cr-info{flex:1;min-width:0}
.cr-name{font-size:14px;font-weight:600;color:var(--text)}
.cr-sub{font-size:12px;color:var(--text3)}
.cr-actions{display:flex;gap:8px}
.cr-link{font-size:12px;color:var(--accent2)}

/* MODAL / SHEET */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.modal-hd{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.modal-title{font-size:17px;font-weight:600}
.modal-close{background:var(--surface2);border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center}

/* FORMS */
.form-body{padding:12px 16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:var(--surface);color:var(--text);appearance:none;-webkit-appearance:none}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-hint{font-size:11px;color:var(--text3);margin-top:4px}
.form-actions{display:flex;gap:10px;padding:12px 16px 16px;border-top:0.5px solid var(--border)}
.btn-cancel{flex:1;padding:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;font-weight:500;background:none;color:var(--text2);cursor:pointer}
.btn-save{flex:2;padding:12px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;background:var(--accent);color:#fff;cursor:pointer}
.btn-save:active{background:var(--accent2)}

/* MULTI-SELECT CHIPS */
.ms-wrap{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 8px;background:var(--surface);min-height:44px;cursor:text}
.ms-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.ms-chip{display:inline-flex;align-items:center;gap:3px;font-size:13px;padding:3px 8px;border-radius:20px;background:var(--accent-bg);color:var(--accent2)}
.ms-chip button{background:none;border:none;cursor:pointer;color:var(--accent2);font-size:14px;padding:0;line-height:1;display:flex;align-items:center}
.ms-input{border:none;outline:none;font-size:15px;font-family:inherit;background:transparent;color:var(--text);width:100%;min-width:60px;padding:2px 4px}
.ms-dropdown{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);max-height:180px;overflow-y:auto;margin-top:4px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.ms-opt{padding:10px 12px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.ms-opt:active{background:var(--surface2)}
.ms-opt-new{color:var(--accent2);font-style:italic}

/* FAB */
.fab{position:fixed;bottom:24px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.25);z-index:100;transition:transform .1s}
.fab:active{transform:scale(.94)}

/* DASHBOARD */
.dash-search{padding:16px 16px 12px;background:var(--surface);border-bottom:0.5px solid var(--border)}
.dash-row{display:flex;gap:8px;align-items:center}
.dash-filter{padding:9px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;background:var(--surface);color:var(--text);appearance:none;-webkit-appearance:none;flex-shrink:0}
.dash-input-wrap{flex:1;position:relative}
.dash-input-wrap input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;background:var(--surface);color:var(--text)}
.dash-input-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-results{background:var(--surface)}

/* UTILITY */
.divider{height:8px;background:var(--bg);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
mark{background:#fff3a0;color:inherit;border-radius:2px;padding:0 1px}
.empty-state{padding:40px 20px;text-align:center;color:var(--text3);font-size:14px;line-height:1.6}
.empty-state svg{width:40px;height:40px;stroke:var(--border2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:12px}
.focus-panel{background:var(--accent-bg);border-top:0.5px solid var(--border);padding:12px 16px}
.focus-panel-hd{font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:10px;display:flex;justify-content:space-between}
.focus-group{margin-bottom:10px}
.focus-group-name{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.focus-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:10px;margin:2px;cursor:pointer}
.fc-active{background:var(--green-bg);color:var(--green)}
.fc-pipeline{background:var(--amber-bg);color:var(--amber)}
.fc-watching{background:var(--surface2);color:var(--text2)}
.toggle-btn{background:none;border:1px solid var(--accent2);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--accent2);cursor:pointer}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">Field<span>Notes</span></div>
    <button class="icon-btn" onclick="openModal('log')" title="Log interaction">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('dash',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Home
    </button>
    <button class="nav-btn" onclick="showPage('contacts',this)">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Contacts
    </button>
    <button class="nav-btn" onclick="showPage('companies',this)">
      <svg viewBox="0 0 24 24"><path d="M3 21h18M3 7h18M3 14h18M5 21V7M19 21V7M10 21V7M14 21V7"/></svg>
      Companies
    </button>
    <button class="nav-btn" onclick="showPage('todos',this)">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      To-Dos
    </button>
  </nav>

  <!-- DASHBOARD PAGE -->
  <div id="page-dash" class="page active">
    <div class="dash-search">
      <div class="dash-row">
        <select class="dash-filter" id="dash-filter" onchange="dashSearch()">
          <option value="all">All</option>
          <option value="contact">Contact</option>
          <option value="sponsor">Sponsor</option>
          <option value="corp">Corporate</option>
        </select>
        <div class="dash-input-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="search" id="dash-search" placeholder="Search contacts, sponsors, companies…" oninput="dashSearch()" autocomplete="off" autocorrect="off" spellcheck="false"/>
        </div>
      </div>
      <div id="dash-results" class="search-results"></div>
    </div>

    <div id="dash-body">
      <div class="section-hd">To-Dos — Now</div>
      <div id="dash-todos"></div>
      <div class="divider"></div>
      <div class="section-hd">Recent Interactions</div>
      <div id="dash-interactions"></div>
    </div>
  </div>

  <!-- CONTACTS PAGE -->
  <div id="page-contacts" class="page">
    <div class="search-wrap">
      <div class="search-row">
        <div class="search-box" style="flex:1">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="search" id="contact-search" placeholder="Search contacts…" oninput="renderContacts()" autocomplete="off" autocorrect="off" spellcheck="false"/>
        </div>
      </div>
    </div>
    <div id="contact-list"></div>
  </div>

  <!-- COMPANIES PAGE -->
  <div id="page-companies" class="page">
    <div class="search-wrap">
      <div class="search-row">
        <select class="search-filter" id="co-filter" onchange="renderCompanies()">
          <option value="all">All types</option>
          <option value="sponsor">PE Sponsors</option>
          <option value="corporate">Corporates</option>
          <option value="other">Other</option>
        </select>
        <div class="search-box">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="search" id="co-search" placeholder="Search companies…" oninput="renderCompanies()" autocomplete="off" autocorrect="off" spellcheck="false"/>
        </div>
      </div>
    </div>
    <div id="company-list"></div>
  </div>

  <!-- TODOS PAGE -->
  <div id="page-todos" class="page">
    <div id="focus-toggle-bar" style="padding:10px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:flex-end">
      <button class="toggle-btn" onclick="toggleFocusPanel()">Show Focus Names</button>
    </div>
    <div id="focus-panel" style="display:none"></div>
    <div id="todo-list"></div>
  </div>

</div><!-- .app -->

<!-- PROFILE MODAL -->
<div class="modal-bg" id="modal-profile">
  <div class="modal" id="modal-profile-body"></div>
</div>

<!-- LOG INTERACTION MODAL -->
<div class="modal-bg" id="modal-log">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="log-title">Log Interaction</span>
      <button class="modal-close" onclick="closeModal('log')">×</button>
    </div>
    <div class="form-body">
      <div class="field">
        <label>Date</label>
        <input type="date" id="log-date"/>
      </div>
      <div class="field">
        <label>Contacts (up to 4)</label>
        <div class="ms-wrap" onclick="focusMs('lc')">
          <div class="ms-chips" id="lc-chips"></div>
          <input class="ms-input" id="lc-input" placeholder="Search contacts…" oninput="msSearch('lc',this.value)" autocomplete="off" autocorrect="off" spellcheck="false"/>
        </div>
        <div id="lc-dd" class="ms-dropdown" style="display:none"></div>
      </div>
      <div class="field">
        <label>Topic (optional)</label>
        <div class="ms-wrap" onclick="focusMs('lt')">
          <div class="ms-chips" id="lt-chips"></div>

function buildSeedContacts(){
  return RAW_CONTACTS.map((r,i)=>{
    const[co,name,,,role,title,coverage,location,connection,email,phone]=
      [r[0],r[1],r[2],r[3],r[3],r[4],r[5],r[6],r[7],r[8],r[9]];
    const parts=name.trim().split(/\s+/);
    const first=parts[0]||'';
    const last=parts.slice(1).join(' ')||'';
    const cRef=coId(co);
    let cType='other';
    if(PE_FIRMS.includes(co))cType='sponsor';
    else if(CORP_NAMES.includes(co)||co==='Stripe')cType='corp';
    return{
      id:'c'+i+'_'+uid(),
      firstName:first,lastName:last,preferredName:'',
      contactType:cType,
      companyId:cRef?cRef.id:null,
      companyType:cRef?cRef.type:null,
      role:r[3],title:r[4],coverage:r[5],
      location:r[6],connection:r[7],email:r[8],phone:r[9],
      linkedin:'',bio:'',priority:'',
      createdAt:new Date().toISOString()
    };
  });
}

let DB = {
  sponsors:[],corps:[],contacts:[],interactions:[],todos:[],focusNames:[]
};

async function loadDB(){
  try{
    const r=await window.storage.get('fn_db');
    if(r){
      const p=JSON.parse(r.value);
      if(p&&p.contacts&&p.contacts.length>0){DB=p;return;}
    }
  }catch(e){}
  // First run — seed data
  DB.sponsors=[...SEED_SPONSORS];
  DB.corps=[...ALL_CORPS_SEED];
  DB.contacts=buildSeedContacts();
  DB.interactions=[];DB.todos=[];DB.focusNames=[];
  await saveDB();
}

// ─────────────────────────────────────────────────────────────
function displayName(c){
  if(!c)return'Unknown';
  return c.preferredName||(c.firstName+' '+c.lastName).trim()||'Unknown';
}
function getCompany(id,type){
  if(type==='sponsor')return DB.sponsors.find(s=>s.id===id);
  return DB.corps.find(c=>c.id===id);
}
function allCompanies(){
  return[
    ...DB.sponsors.map(s=>({...s,_type:'sponsor'})),
    ...DB.corps.map(c=>({...c,_type:'corp'}))
  ].sort((a,b)=>a.name.localeCompare(b.name));
}
function contactsAtCompany(companyId){
  return DB.contacts.filter(c=>c.companyId===companyId);
}
function portcosOfSponsor(sponsorId){
  return DB.corps.filter(c=>c.peOwner===sponsorId);
}
function highlight(text,q){
  if(!q||!text)return escHtml(text||'');
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return escHtml(text).replace(re,'<mark>$1</mark>');
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hl(t,q){return highlight(t,q)}

const msState={lc:[],lt:[],'ac-co':[],'aco-pe':[],'af-co':[],'af-sp':[],'at-c':[],'at-co':[]};
const msMax={lc:4,lt:1,'ac-co':1,'aco-pe':1,'af-co':1,'af-sp':1,'at-c':1,'at-co':1};

function focusMs(key){document.getElementById(key+'-input').focus();}

function renderMsChips(key){
  const cont=document.getElementById(key+'-chips');
  if(!cont)return;
  cont.innerHTML=(msState[key]||[]).map(item=>
    `<span class="ms-chip">${escHtml(item.label)}<button onclick="msRemove('${key}','${item.id}')">×</button></span>`
  ).join('');
}

function msRemove(key,id){
  msState[key]=(msState[key]||[]).filter(i=>i.id!==id);
  renderMsChips(key);
}

function msSearch(key,q){
  const dd=document.getElementById(key+'-dd');
  if(!dd)return;
  if(!q.trim()){dd.style.display='none';return;}
  const lq=q.toLowerCase();
  const max=msMax[key]||4;
  const already=(msState[key]||[]).map(i=>i.id);

  let items=[];
  if(key==='lc'||key==='at-c'){
    items=DB.contacts
      .filter(c=>!already.includes(c.id)&&displayName(c).toLowerCase().includes(lq))
      .slice(0,8)
      .map(c=>({id:c.id,label:displayName(c),sub:c.role||'',_type:'contact'}));
  } else if(key==='lt'||key==='at-co'){
    items=allCompanies()
      .filter(c=>!already.includes(c.id)&&c.name.toLowerCase().includes(lq))
      .slice(0,8)
      .map(c=>({id:c.id,label:c.name,sub:c._type==='sponsor'?'PE Firm':'Corporate',_type:c._type}));
  } else if(key==='ac-co'){
    items=allCompanies()
      .filter(c=>!already.includes(c.id)&&c.name.toLowerCase().includes(lq))
      .slice(0,8)
      .map(c=>({id:c.id,label:c.name,sub:c._type==='sponsor'?'PE Firm':'Corporate',_type:c._type}));
  } else if(key==='aco-pe'){
    items=DB.sponsors
      .filter(s=>!already.includes(s.id)&&s.name.toLowerCase().includes(lq))
      .slice(0,8)
      .map(s=>({id:s.id,label:s.name,sub:'PE Firm',_type:'sponsor'}));
  } else if(key==='af-co'){
    items=DB.corps
      .filter(c=>!already.includes(c.id)&&c.name.toLowerCase().includes(lq))
      .slice(0,8)
      .map(c=>({id:c.id,label:c.name,sub:c.type,_type:'corp'}));
    if(!items.length&&q.trim()){
      items=[{id:'__new__',label:'Create "'+q.trim()+'"',sub:'New company',_type:'new',_name:q.trim()}];
    }
  } else if(key==='af-sp'){
    items=DB.sponsors
      .filter(s=>!already.includes(s.id)&&s.name.toLowerCase().includes(lq))
      .slice(0,8)
      .map(s=>({id:s.id,label:s.name,sub:'PE Firm',_type:'sponsor'}));
  }

  if(!items.length){dd.style.display='none';return;}
  dd.innerHTML=items.map(item=>
    `<div class="ms-opt ${item.id==='__new__'?'ms-opt-new':''}" onclick="msSelect('${key}',${JSON.stringify(item).replace(/"/g,'&quot;')})">
      <span>${escHtml(item.label)}</span>
      <span style="font-size:11px;color:var(--text3)">${escHtml(item.sub)}</span>
    </div>`
  ).join('');
  dd.style.display='block';
}

function msSelect(key,item){
  if(item.id==='__new__'){
    // Quick create company stub
    const newCo={id:uid(),name:item._name,type:'Private',peOwner:null,description:'',revenue:'',ebitda:'',margin:'',growth:'',valuation:'',leverage:'',priority:'',notes:''};
    DB.corps.push(newCo);saveDB();
    item={id:newCo.id,label:newCo.name,sub:'Private',_type:'corp'};
  }
  const max=msMax[key]||4;
  if((msState[key]||[]).length>=max)msState[key]=[];
  msState[key]=[...(msState[key]||[]),{id:item.id,label:item.label,_type:item._type}];
  renderMsChips(key);
  document.getElementById(key+'-input').value='';
  document.getElementById(key+'-dd').style.display='none';
}

    if(hits.length){

// CONTACTS LIST
// ─────────────────────────────────────────────────────────────
function renderContacts(){
  const q=(document.getElementById('contact-search')||{}).value||'';
  const lq=q.toLowerCase();
  const list=document.getElementById('contact-list');
  let contacts=[...DB.contacts].sort((a,b)=>{
    const an=(a.lastName||a.firstName||'').toLowerCase();
    const bn=(b.lastName||b.firstName||'').toLowerCase();
    return an.localeCompare(bn);
  });
  if(lq)contacts=contacts.filter(c=>[displayName(c),c.role,c.email,c.coverage,c.connection,c.bio].join(' ').toLowerCase().includes(lq));

  if(!contacts.length){list.innerHTML='<div class="empty-state">No contacts found</div>';return;}

  // Group by first letter of last name
  let html='';
  let lastLetter='';
  contacts.forEach(c=>{
    const letter=((c.lastName||c.firstName||'?')[0]||'?').toUpperCase();
    if(letter!==lastLetter){
      html+=`<div class="section-hd">${letter}</div>`;
      lastLetter=letter;
    }
    const co=c.companyId?getCompanyName(c.companyId,c.companyType):'';
    const lastContact=lastContactedDate(c.id);
    html+=`<div class="card" onclick="openProfile('contact','${c.id}')">
      <div class="avatar av-blue">${initials(displayName(c))}</div>
      <div class="card-body">
        <div class="card-name">${hl(displayName(c),q)}</div>
        <div class="card-sub">${hl(c.role||'',q)}${c.role&&co?' · ':''}${hl(co,q)}</div>
        ${lastContact?`<div class="card-meta">Last: ${lastContact}</div>`:''}
      </div>
      <div class="card-right">
        <span class="badge ${c.contactType==='sponsor'?'b-sponsor':c.contactType==='corp'?'b-corp':'b-other'}">${c.contactType==='sponsor'?'Sponsor':c.contactType==='corp'?'Corp':'Other'}</span>
        <svg class="chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>`;
  });
  list.innerHTML=html;
}

function lastContactedDate(contactId){
  const hits=DB.interactions.filter(i=>i.contactIds&&i.contactIds.includes(contactId));
  if(!hits.length)return'';
  hits.sort((a,b)=>new Date(b.date)-new Date(a.date));
  return fmtDate(hits[0].date);
}

      html+=sponsors.map(s=>{
        const ccount=contactsAtCompany(s.id).length;
        const pcount=portcosOfSponsor(s.id).length;
        return`<div class="card" onclick="openProfile('sponsor','${s.id}')">

            <div class="card-name">${hl(s.name,q)}</div>

            <span class="badge b-sponsor">Sponsor</span>
            <svg class="chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </div>`;
      }).join('');
    }
  }

  if(filter==='all'||filter==='corporate'){
    let corps=[...DB.corps].filter(c=>c.type!=='Other').sort((a,b)=>a.name.localeCompare(b.name));
    if(lq)corps=corps.filter(c=>c.name.toLowerCase().includes(lq)||(c.description||'').toLowerCase().includes(lq));
    if(corps.length){
      if(filter==='all')html+='<div class="divider"></div><div class="section-hd">Corporates</div>';
      html+=corps.map(c=>{
        const owner=c.peOwner?getSponsorName(c.peOwner):'';
        return`<div class="card" onclick="openProfile('corp','${c.id}')">
          <div class="avatar av-green">${initials(c.name)}</div>
          <div class="card-body">
            <div class="card-name">${hl(c.name,q)}</div>
            <div class="card-sub">${c.type}${owner?' · PE: '+hl(owner,q):''}</div>
            ${c.revenue||c.ebitda?`<div class="card-meta">${c.revenue?'Rev: '+c.revenue:''}${c.revenue&&c.ebitda?' | ':''}${c.ebitda?'EBITDA: '+c.ebitda:''}</div>`:''}
          </div>
          <div class="card-right">
            <span class="badge b-corp">Corp</span>
            <svg class="chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </div>`;
      }).join('');
    }
  }

  if(filter==='all'||filter==='other'){
    let others=[...DB.corps].filter(c=>c.type==='Other').sort((a,b)=>a.name.localeCompare(b.name));
    if(lq)others=others.filter(c=>c.name.toLowerCase().includes(lq));
    if(others.length){
      if(filter==='all')html+='<div class="divider"></div><div class="section-hd">Other</div>';
      html+=others.map(c=>`<div class="card" onclick="openProfile('corp','${c.id}')">
        <div class="avatar av-gray">${initials(c.name)}</div>
        <div class="card-body"><div class="card-name">${hl(c.name,q)}</div><div class="card-sub">Bank / Advisory / Other</div></div>
        <div class="card-right"><span class="badge b-other">Other</span><svg class="chevron" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
      </div>`).join('');
    }
  }

  list.innerHTML=html||'<div class="empty-state">No companies found</div>';
}

let showFocus=false;
function toggleFocusPanel(){
  showFocus=!showFocus;
  document.querySelector('#focus-toggle-bar button').textContent=showFocus?'Hide Focus Names':'Show Focus Names';
  renderTodos();
}

function renderTodos(){
  // Focus panel
  const fp=document.getElementById('focus-panel');
  if(showFocus&&DB.focusNames.length){
    const bySponsors={};
    DB.focusNames.forEach(f=>{
      const key=f.sponsorLabel||'Personal';
      if(!bySponsors[key])bySponsors[key]=[];
      bySponsors[key].push(f);
    });
    fp.style.display='block';
    fp.innerHTML=`<div class="focus-panel">
      <div class="focus-panel-hd"><span>Focus Names</span></div>
      ${Object.entries(bySponsors).map(([sp,items])=>`
        <div class="focus-group">
          <div class="focus-group-name">${escHtml(sp)}</div>
          ${items.map(f=>`<span class="focus-chip fc-${f.status.toLowerCase()}" onclick="openProfile('corp','${f.companyId}')">${escHtml(f.companyLabel)}</span>`).join('')}
        </div>
      `).join('')}
    </div>`;
  } else {fp.style.display='none';}

  const list=document.getElementById('todo-list');
  const priorities=['Now','Later','Radar'];
  let html='';

  priorities.forEach(p=>{
    const items=DB.todos.filter(t=>t.status==='Open'&&t.priority===p);
    if(items.length){
      html+=`<div class="section-hd">${p}</div>`;
      html+=items.map(t=>renderTodoItem(t)).join('');
    }
  });

  // Recently completed
  const done=DB.todos.filter(t=>t.status==='Complete').sort((a,b)=>new Date(b.completedAt)-new Date(a.completedAt)).slice(0,5);
  if(done.length){
    html+='<div class="divider"></div><div class="section-hd">Recently completed</div>';
    html+=done.map(t=>renderTodoItem(t)).join('');
  }

  if(!DB.todos.length)html='<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>No to-dos yet.<br>Tap + to add one.</div>';
  list.innerHTML=html;
}

function renderTodoItem(t,compact){
  const done=t.status==='Complete';
  const link=[];
  if(t.contactLabel)link.push('👤 '+t.contactLabel);
  if(t.companyLabel)link.push('🏢 '+t.companyLabel);
  return`<div class="todo-item">
    <button class="todo-check ${done?'done':''}" onclick="toggleTodo('${t.id}')">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    </button>
    <div class="todo-content">
      <div class="todo-text ${done?'done':''}">${escHtml(t.text)}</div>
      ${link.length?`<div class="todo-link">${link.join(' · ')}</div>`:''}
    </div>
    <div class="todo-right">
      <span class="badge b-${t.priority.toLowerCase()}">${t.priority}</span>
      ${!done&&!compact?`<div class="todo-actions">
        <select class="move-sel" onchange="changePriority('${t.id}',this.value)">
          <option value="">Move</option>
          ${['Now','Later','Radar'].filter(x=>x!==t.priority).map(x=>`<option value="${x}">${x}</option>`).join('')}
        </select>
        <button class="mini-btn" onclick="deleteTodo('${t.id}')">✕</button>
      </div>`:''}
    </div>
  </div>`;
}

function toggleTodo(id){
  const t=DB.todos.find(x=>x.id===id);
  if(!t)return;
  t.status=t.status==='Complete'?'Open':'Complete';
  t.completedAt=t.status==='Complete'?new Date().toISOString():null;
  saveDB();renderTodos();
}
function changePriority(id,val){
  if(!val)return;
  const t=DB.todos.find(x=>x.id===id);
  if(!t)return;
  t.priority=val;
  saveDB();renderTodos();
}
function deleteTodo(id){
  if(!confirm('Delete this to-do?'))return;
  DB.todos=DB.todos.filter(x=>x.id!==id);
  saveDB();renderTodos();
}

function exportCSV(data,filename){
  if(!data.length)return;
  const keys=Object.keys(data[0]);
  const rows=[keys.join(','),...data.map(r=>keys.map(k=>{
    const v=String(r[k]||'').replace(/"/g,'""');
    return v.includes(',')||v.includes('"')||v.includes('\n')?`"${v}"`:v;
  }).join(','))];
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
